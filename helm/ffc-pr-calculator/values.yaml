environment: production
environmentCode:
name: ffc-pr-calculator
namespace: ffc-pr
workstream: ffc-pr
image: ffc-pr-calculator

labels:
  component: web

appInsights:
  connectionString:

containerConfigMap:
  name: ffc-pr-calculator-config-map

containerSecret:
  name: ffc-pr-calculator-container-secret
  type: Opaque

deployment:
  priorityClassName: high
  replicas: 2
  minReadySeconds: 0
  minReplicas: 2
  maxReplicas: 4
  cpuThreshold: 80
  memoryThreshold: 80

container:
  requestMemory: 100Mi
  requestCpu: 40m
  limitMemory: 100Mi
  limitCpu: 100m
  port: 3000
  googleTagManagerKey: GTM-5XJKV8F

ingress:
  class: nginx
  endpoint: ffc-pr-calculator
  server: example.com

livenessProbe:
  path: /healthz
  port: 3000
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  path: /healthy
  port: 3000
  initialDelaySeconds: 20
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 5

workloadIdentity: true  

azureIdentity:
  clientID: not-a-real-clientID
  resourceID: not-a-real-resourceID

secretProviderClass:
  azure:
    keyvaultName: SNDFFCINFKV2001
    objects: # reading the secret from Azure Key Vault
      - objectName: appInsights-connectionString # secret name in Azure Key Vault
        objectType: secret

  secretObjects: # creating a Kubernetes secret from the Azure Key Vault secrets
    - secretName: ffc-pr-calculator
      type: Opaque
      data:
        - objectName: appInsights-connectionString # secret name in Azure Key Vault
          key: APPINSIGHTS_CONNECTIONSTRING # the secret key in the Kubernetes secret and use in the application